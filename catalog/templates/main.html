<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Главная страница</title>
</head>
    <body>
    <h1>Последние 5 продуктов:</h1>
    {% if latest_products %}
        <ul>
            {% for product in latest_products %}
                <li>{{ product.name }} (создан {{ product.created_at }})</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Продукты не найдены.</p>
    {% endif %}
    </body>
</html>
